<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>allride · Profile</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="device-shell">
      <section class="device">
        <header class="statusbar">
          <span>9:41</span>
          <div class="statusbar__icons">
            <span>5G</span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
          </div>
        </header>

        <div class="safe-area profile-screen">
          <div class="top-row">
            <div>
              <h1 class="title">My profile</h1>
              <p class="subtitle">Personal area and quick settings</p>
            </div>
            <button class="icon-btn" type="button" aria-label="Profile settings">⚙</button>
          </div>

          <section class="profile-card-soft">
            <div class="profile-card-soft__avatar">🌤️</div>
            <div>
              <p class="profile-card-soft__label">My Profile</p>
              <h2 class="profile-card-soft__name js-profile-name">User Name</h2>
              <p class="profile-card-soft__meta js-profile-phone">+65 8123 4567</p>
            </div>
          </section>

          <section class="quick-grid quick-grid--profile">
            <article class="quick-card">
              <span class="quick-emoji">🧾</span>
              My trips
            </article>
            <article class="quick-card">
              <span class="quick-emoji">💳</span>
              Wallet
            </article>
            <article class="quick-card">
              <span class="quick-emoji">🎁</span>
              Rewards
            </article>
            <article class="quick-card">
              <span class="quick-emoji">❓</span>
              Help
            </article>
          </section>

          <section class="panel panel--flat">
            <p class="label">Account</p>
            <ul class="list">
              <li class="list-item"><span>Notifications</span><span>On</span></li>
              <li class="list-item"><span>Payment method</span><span>Visa ••78</span></li>
              <li class="list-item"><span>Language</span><span>English</span></li>
            </ul>
          </section>

          <a class="btn btn--primary btn--lg" href="./home.html">Back to home</a>

          <nav class="bottom-tabs">
            <a class="bottom-tab" data-tab="home.html" href="./home.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/home.png" alt="" /></span>
              <span class="tab-label">Home</span>
            </a>
            <a class="bottom-tab" data-tab="journey.html,rides.html" href="./journey.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/rides.png" alt="" /></span>
              <span class="tab-label">Rides</span>
            </a>
            <a class="bottom-tab" data-tab="tracking.html" href="./tracking.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/track.png" alt="" /></span>
              <span class="tab-label">Track</span>
            </a>
            <a class="bottom-tab" data-tab="profile.html" href="./profile.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/profile.png" alt="" /></span>
              <span class="tab-label">Profile</span>
            </a>
          </nav>
        </div>
      </section>

      <nav class="flow-nav">
        <a class="flow-nav__link" href="./tracking.html">← Back</a>
        <a class="flow-nav__link" href="./splash.html">Restart ↺</a>
      </nav>
    </main>

    <script src="../assets/app.js"></script>
  </body>
</html>
