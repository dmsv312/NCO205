<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>allride · Home</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="device-shell">
      <section class="device">
        <header class="statusbar">
          <span>9:41</span>
          <div class="statusbar__icons">
            <span>5G</span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
          </div>
        </header>

        <div class="safe-area">
          <div class="top-row">
            <div>
              <h1 class="title">Hello, Dmitry</h1>
              <p class="subtitle">Where are we heading today?</p>
            </div>
            <button class="icon-btn" aria-label="Menu">☰</button>
          </div>

          <section class="map-card">
            <div class="route-chip">
              <div>
                <strong>Pickup</strong>
                Marina Bay Sands
              </div>
              <span>Now</span>
            </div>
            <div class="route-chip">
              <div>
                <strong>Destination</strong>
                Changi Business Park
              </div>
              <span>28 min</span>
            </div>
          </section>

          <div class="search-box">🔎 Search destination</div>

          <section class="quick-grid">
            <a class="quick-card" href="./rides.html">
              <span class="quick-emoji">🚕</span>
              Ride
            </a>
            <a class="quick-card" href="./rides.html">
              <span class="quick-emoji">📦</span>
              Delivery
            </a>
            <a class="quick-card" href="./rides.html">
              <span class="quick-emoji">🕒</span>
              Rentals
            </a>
          </section>

          <nav class="bottom-tabs">
            <a class="bottom-tab" data-tab="home.html" href="./home.html">🏠<br />Home</a>
            <a class="bottom-tab" data-tab="rides.html" href="./rides.html">🚘<br />Rides</a>
            <a class="bottom-tab" data-tab="tracking.html" href="./tracking.html">🧭<br />Track</a>
            <a class="bottom-tab" data-tab="profile.html" href="./profile.html">👤<br />Profile</a>
          </nav>
        </div>
      </section>

      <nav class="flow-nav">
        <a class="flow-nav__link" href="./auth.html">← Назад</a>
        <a class="flow-nav__link" href="./rides.html">Далее →</a>
      </nav>
    </main>

    <script src="../assets/app.js"></script>
