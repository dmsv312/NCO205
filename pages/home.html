<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>allride · Home</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="device-shell">
      <section class="device">
        <header class="statusbar">
          <span>9:41</span>
          <div class="statusbar__icons">
            <span>5G</span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
          </div>
        </header>

        <div class="safe-area home-screen">
          <div class="top-row top-row--compact">
            <h1 class="title title--script">Hello <span class="js-greeting-name">XXX</span> out today?</h1>
            <button class="icon-btn" aria-label="Menu">☰</button>
          </div>

          <section class="map-card map-card--city">
            <div class="map-live js-map-home" aria-label="Singapore route preview"></div>
          </section>

          <section class="location-note js-open-rides-by-address">
            <div class="location-note__icon">📌</div>
            <div>
              <p class="label">Boarding at</p>
              <p class="location-note__text js-pickup-text">Blk C carpark, Singapore University of Social Sciences</p>
            </div>
          </section>

          <button class="search-box search-box--action js-open-search" type="button">
            <span>🔎 <span class="js-destination-text">Search your destination</span></span>
            <span class="search-box__action">➜</span>
          </button>

          <section class="panel panel--locations">
            <ul class="recent-list">
              <li class="recent-item js-recent-destination" data-destination="XXX's home"><span>🏠 XXX's home</span><span>Home</span></li>
              <li class="recent-item js-recent-destination" data-destination="Office"><span>💼 Office</span><span>Work</span></li>
              <li class="recent-item js-recent-destination" data-destination="Singapore Flyer"><span>🕘 Singapore Flyer</span><span>Recent</span></li>
              <li class="recent-item js-recent-destination" data-destination="Tampines Mall"><span>🕘 Tampines Mall</span><span>Recent</span></li>
            </ul>
          </section>

          <p class="promo-banner">LIFT YOUR RIDE · ALLRIDE</p>

          <nav class="bottom-tabs">
            <a class="bottom-tab" data-tab="home.html" href="./home.html">
              <span class="tab-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M3.5 10.2L12 3.5l8.5 6.7" />
                  <path d="M5.5 9.8V20h13V9.8" />
                  <path d="M10 20v-5.2h4V20" />
                </svg>
              </span>
              <span class="tab-label">Home</span>
            </a>
            <a class="bottom-tab" data-tab="journey.html,rides.html" href="./journey.html">
              <span class="tab-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M5.2 15.2h13.6l-1.1-4.4a1.9 1.9 0 0 0-1.8-1.3H8.1a1.9 1.9 0 0 0-1.8 1.3l-1.1 4.4Z" />
                  <path d="M6 15.2v1.3M18 15.2v1.3" />
                  <circle cx="8" cy="17.5" r="1.5" />
                  <circle cx="16" cy="17.5" r="1.5" />
                </svg>
              </span>
              <span class="tab-label">Rides</span>
            </a>
            <a class="bottom-tab" data-tab="tracking.html" href="./tracking.html">
              <span class="tab-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M12 21s7-4.4 7-10a7 7 0 1 0-14 0c0 5.6 7 10 7 10Z" />
                  <circle cx="12" cy="11" r="2.4" />
                </svg>
              </span>
              <span class="tab-label">Track</span>
            </a>
            <a class="bottom-tab" data-tab="profile.html" href="./profile.html">
              <span class="tab-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="8" r="3.4" />
                  <path d="M5.5 19.5a6.5 6.5 0 0 1 13 0" />
                </svg>
              </span>
              <span class="tab-label">Profile</span>
            </a>
          </nav>
        </div>
      </section>

      <nav class="flow-nav">
        <a class="flow-nav__link" href="./auth.html">← Back</a>
        <a class="flow-nav__link" href="./journey.html">Next →</a>
      </nav>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="../assets/app.js"></script>
  </body>
</html>
