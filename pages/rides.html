<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>allride · Ride options</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="device-shell">
      <section class="device">
        <header class="statusbar">
          <span>9:41</span>
          <div class="statusbar__icons">
            <span>5G</span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
          </div>
        </header>

        <div class="safe-area rides-screen">
          <div class="top-row top-row--compact top-row--end">
            <button class="icon-btn" aria-label="Menu">☰</button>
          </div>

          <section class="map-card map-card--route-view rides-map">
            <div class="map-grid"></div>
            <div class="route-route route-route--a"></div>
            <div class="route-route route-route--b"></div>
            <div class="route-stop route-stop--start"></div>
            <div class="route-stop route-stop--end"></div>
          </section>

          <section class="fare-filter">
            <div class="fare-filter__head">
              <p class="label">Price Range</p>
              <p class="fare-filter__value">max <strong class="js-price-value">150</strong></p>
            </div>
            <div class="fare-filter__bounds">
              <span>10</span>
              <span>150</span>
            </div>
            <input class="range-slider js-price-range" type="range" min="10" max="150" value="150" step="1" />
          </section>

          <section class="fare-browser">
            <aside class="fare-cats">
              <button class="fare-cat is-active" type="button" data-cat="all">All</button>
              <button class="fare-cat" type="button" data-cat="carpool">Car Pool</button>
              <button class="fare-cat" type="button" data-cat="standard">Standard</button>
              <button class="fare-cat" type="button" data-cat="premium">Premium</button>
              <button class="fare-cat" type="button" data-cat="kids">With Kids</button>
              <button class="fare-cat" type="button" data-cat="pets">With Pets</button>
              <button class="fare-cat" type="button" data-cat="group">Large Group</button>
            </aside>

            <div class="fare-results">
              <article class="fare-group">
                <h3 class="fare-group__title">4 pax</h3>

                <label class="fare-row is-selected" data-category="carpool" data-price="24.40">
                  <span class="provider-badge provider-badge--amber">MC</span>
                  <span class="fare-row__name">Taxi or Car · 4 pax</span>
                  <span class="fare-row__price">$24.40</span>
                  <input type="checkbox" checked />
                </label>

                <label class="fare-row" data-category="standard" data-price="25.40">
                  <span class="provider-badge provider-badge--mint">GR</span>
                  <span class="fare-row__name">Standard · 4 pax</span>
                  <span class="fare-row__price">$25.40</span>
                  <input type="checkbox" />
                </label>

                <label class="fare-row" data-category="premium" data-price="28.70">
                  <span class="provider-badge provider-badge--lime">GC</span>
                  <span class="fare-row__name">GoCar · 4 pax</span>
                  <span class="fare-row__price">$28.70</span>
                  <input type="checkbox" />
                </label>

                <label class="fare-row" data-category="kids" data-price="30.36">
                  <span class="provider-badge provider-badge--red">RY</span>
                  <span class="fare-row__name">RydeX · 4 pax</span>
                  <span class="fare-row__price">$30.36</span>
                  <input type="checkbox" />
                </label>

                <label class="fare-row" data-category="pets" data-price="35.00">
                  <span class="provider-badge provider-badge--orange">TD</span>
                  <span class="fare-row__name">AnyTADA · 4 pax</span>
                  <span class="fare-row__price">$35.00</span>
                  <input type="checkbox" />
                </label>
              </article>

              <article class="fare-group">
                <h3 class="fare-group__title">6 pax</h3>

                <label class="fare-row" data-category="group" data-price="33.10">
                  <span class="provider-badge provider-badge--amber">MC</span>
                  <span class="fare-row__name">Taxi or Car · 6 pax</span>
                  <span class="fare-row__price">$33.10</span>
                  <input type="checkbox" />
                </label>

                <label class="fare-row" data-category="group" data-price="40.10">
                  <span class="provider-badge provider-badge--mint">GR</span>
                  <span class="fare-row__name">Standard · 6 pax</span>
                  <span class="fare-row__price">$40.10</span>
                  <input type="checkbox" />
                </label>

                <label class="fare-row" data-category="group" data-price="40.30">
                  <span class="provider-badge provider-badge--lime">GC</span>
                  <span class="fare-row__name">GoCar XL · 6 pax</span>
                  <span class="fare-row__price">$40.30</span>
                  <input type="checkbox" />
                </label>

                <label class="fare-row" data-category="group" data-price="50.74">
                  <span class="provider-badge provider-badge--red">RY</span>
                  <span class="fare-row__name">RydeXL · 6 pax</span>
                  <span class="fare-row__price">$50.74</span>
                  <input type="checkbox" />
                </label>
              </article>
            </div>
          </section>

          <section class="summary-card summary-card--compact">
            <span class="summary-label">Selected fare</span>
            <h2 class="summary-price js-selected-fare">$24.40</h2>
            <a class="btn btn--primary btn--lg" href="./tracking.html">Confirm and track</a>
          </section>

          <nav class="bottom-tabs">
            <a class="bottom-tab" data-tab="home.html" href="./home.html">🏠<br />Home</a>
            <a class="bottom-tab" data-tab="journey.html,rides.html" href="./journey.html">🚘<br />Rides</a>
            <a class="bottom-tab" data-tab="tracking.html" href="./tracking.html">🧭<br />Track</a>
            <a class="bottom-tab" data-tab="profile.html" href="./profile.html">👤<br />Profile</a>
          </nav>
        </div>
      </section>

      <nav class="flow-nav">
        <a class="flow-nav__link" href="./journey.html">← Назад</a>
        <a class="flow-nav__link" href="./tracking.html">Далее →</a>
      </nav>
    </main>

    <script src="../assets/app.js"></script>
  </body>
</html>
