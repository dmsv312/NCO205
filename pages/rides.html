<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>allride · Ride options</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="device-shell">
      <section class="device">
        <header class="statusbar">
          <span>9:41</span>
          <div class="statusbar__icons">
            <span>5G</span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
          </div>
        </header>

        <div class="safe-area rides-screen">
          <section class="map-card map-card--route-view rides-map">
            <button class="icon-btn map-card__menu" aria-label="Menu">☰</button>
            <div class="map-live js-map-rides" aria-label="Available rides map"></div>
          </section>

          <div class="rides-toolbar">
            <button class="mode-chip js-mode-toggle" type="button">Working adult mode</button>
            <p class="rides-selected js-selected-meta">0 options selected</p>
          </div>

          <section class="fare-filter">
            <div class="fare-filter__head">
              <p class="label">Price Range</p>
              <p class="fare-filter__value">
                <strong class="js-price-min">10</strong>–<strong class="js-price-max">55</strong>
              </p>
            </div>

            <div class="fare-filter__bounds fare-filter__bounds--triple">
              <span>10</span>
              <span class="js-price-current">55</span>
              <span>150</span>
            </div>

            <div class="range-stack">
              <input class="js-range-min" type="hidden" value="10" />
              <input class="range-slider js-range-max" type="range" min="10" max="150" value="55" step="1" />
            </div>
          </section>

          <section class="fare-browser">
            <aside class="fare-cats">
              <div class="fare-cat" data-cat="carpool">Car Pool</div>
              <div class="fare-cat" data-cat="standard">Standard</div>
              <div class="fare-cat" data-cat="premium">Premium</div>
              <div class="fare-cat" data-cat="kids">With Kids</div>
              <div class="fare-cat" data-cat="pets">With Pets</div>
              <div class="fare-cat" data-cat="special">Special assistance</div>
              <div class="fare-cat" data-cat="group">Large Group</div>
            </aside>

            <div class="fare-results">
              <article class="fare-group">
                <h3 class="fare-group__title">4 pax</h3>

                <label class="fare-row" data-id="f1" data-category="carpool" data-price="18.40">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=grab.com&sz=32" alt="Grab" loading="lazy" /></span>
                  <span class="fare-row__name">Hitch · 1–4 pax</span>
                  <span class="fare-row__price">$18.40</span>
                  <input class="fare-check" type="checkbox" />
                </label>

                <label class="fare-row" data-id="f2" data-category="standard" data-price="22.54">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=rydesharing.com&sz=32" alt="Ryde" loading="lazy" /></span>
                  <span class="fare-row__name">RydeFLASH · 1–4 pax</span>
                  <span class="fare-row__price">$22.54</span>
                  <input class="fare-check" type="checkbox" />
                </label>

                <label class="fare-row" data-id="f3" data-category="premium" data-price="24.40">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=cdgtaxi.com.sg&sz=32" alt="CDG Zig" loading="lazy" /></span>
                  <span class="fare-row__name">Taxi or Car · 4 pax</span>
                  <span class="fare-row__price">$24.40</span>
                  <input class="fare-check" type="checkbox" />
                </label>

                <label class="fare-row" data-id="f4" data-category="standard" data-price="25.40">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=grab.com&sz=32" alt="Grab" loading="lazy" /></span>
                  <span class="fare-row__name">Standard · 4 pax</span>
                  <span class="fare-row__price">$25.40</span>
                  <input class="fare-check" type="checkbox" />
                </label>

                <label class="fare-row" data-id="f5" data-category="premium" data-price="28.70">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=gojek.com&sz=32" alt="Gojek" loading="lazy" /></span>
                  <span class="fare-row__name">GoCar · 4 pax</span>
                  <span class="fare-row__price">$28.70</span>
                  <input class="fare-check" type="checkbox" />
                </label>

                <label class="fare-row" data-id="f6" data-category="kids" data-price="30.36">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=rydesharing.com&sz=32" alt="Ryde" loading="lazy" /></span>
                  <span class="fare-row__name">RydeX · 4 pax</span>
                  <span class="fare-row__price">$30.36</span>
                  <input class="fare-check" type="checkbox" />
                </label>

                <label class="fare-row" data-id="f7" data-category="pets" data-price="35.00">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=tada.global&sz=32" alt="TADA" loading="lazy" /></span>
                  <span class="fare-row__name">AnyTADA · 4 pax</span>
                  <span class="fare-row__price">$35.00</span>
                  <input class="fare-check" type="checkbox" />
                </label>
              </article>

              <article class="fare-group">
                <h3 class="fare-group__title">6 pax</h3>

                <label class="fare-row" data-id="f8" data-category="group" data-price="33.10">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=cdgtaxi.com.sg&sz=32" alt="CDG Zig" loading="lazy" /></span>
                  <span class="fare-row__name">Taxi or Car · 6 pax</span>
                  <span class="fare-row__price">$33.10</span>
                  <input class="fare-check" type="checkbox" />
                </label>

                <label class="fare-row" data-id="f9" data-category="group" data-price="40.10">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=grab.com&sz=32" alt="Grab" loading="lazy" /></span>
                  <span class="fare-row__name">Standard · 6 pax</span>
                  <span class="fare-row__price">$40.10</span>
                  <input class="fare-check" type="checkbox" />
                </label>

                <label class="fare-row" data-id="f10" data-category="group" data-price="40.30">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=gojek.com&sz=32" alt="Gojek" loading="lazy" /></span>
                  <span class="fare-row__name">GoCar XL · 6 pax</span>
                  <span class="fare-row__price">$40.30</span>
                  <input class="fare-check" type="checkbox" />
                </label>

                <label class="fare-row" data-id="f11" data-category="group" data-price="50.74">
                  <span class="provider-badge provider-badge--logo"><img width="12" height="12" class="provider-logo-img" src="https://www.google.com/s2/favicons?domain=rydesharing.com&sz=32" alt="Ryde" loading="lazy" /></span>
                  <span class="fare-row__name">RydeXL · 6 pax</span>
                  <span class="fare-row__price">$50.74</span>
                  <input class="fare-check" type="checkbox" />
                </label>
              </article>
            </div>
          </section>

          <a class="btn btn--book btn--lg js-book-btn" href="./finding.html">Book</a>

          <nav class="bottom-tabs">
            <a class="bottom-tab" data-tab="home.html" href="./home.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/home.svg" alt="" /></span>
              <span class="tab-label">Home</span>
            </a>
            <a class="bottom-tab" data-tab="journey.html,rides.html" href="./journey.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/rides.svg" alt="" /></span>
              <span class="tab-label">Rides</span>
            </a>
            <a class="bottom-tab" data-tab="tracking.html" href="./tracking.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/track.svg" alt="" /></span>
              <span class="tab-label">Track</span>
            </a>
            <a class="bottom-tab" data-tab="profile.html" href="./profile.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/profile.svg" alt="" /></span>
              <span class="tab-label">Profile</span>
            </a>
          </nav>
        </div>
      </section>

      <nav class="flow-nav">
        <a class="flow-nav__link" href="./journey.html">← Back</a>
        <a class="flow-nav__link" href="./finding.html">Next →</a>
      </nav>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="../assets/app.js"></script>
  </body>
</html>
