<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>allride · Login</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="device-shell">
      <section class="device">
        <header class="statusbar">
          <span>9:41</span>
          <div class="statusbar__icons">
            <span>5G</span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
          </div>
        </header>

        <div class="safe-area">
          <section class="hero-card">
            <div class="hero-card__content">
              <p class="hero-label">Welcome to</p>
              <h1 class="hero-title">allride</h1>
              <p class="hero-note">Вход по номеру телефона для новых и действующих пользователей</p>
            </div>
          </section>

          <section class="panel js-auth-form">
            <label class="label" for="phone">Phone number</label>
            <div class="pill-input">
              <span>+65</span>
              <input id="phone" class="js-input-phone" type="tel" placeholder="Input your number" />
            </div>

            <label class="label" for="otp">OTP via SMS</label>
            <div class="pill-input">
              <input id="otp" class="js-input-otp" type="text" inputmode="numeric" placeholder="Enter OTP" />
            </div>

            <p class="form-error js-auth-error" aria-live="polite"></p>

            <a class="btn btn--primary btn--lg js-login-btn" href="./home.html">Let's go</a>
          </section>
        </div>
      </section>

      <nav class="flow-nav">
        <a class="flow-nav__link" href="./splash.html">← Назад</a>
        <a class="flow-nav__link" href="./home.html">Далее →</a>
      </nav>
    </main>

    <script src="../assets/app.js"></script>
  </body>
</html>
