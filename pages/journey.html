<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>allride · Journey</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="device-shell">
      <section class="device">
        <header class="statusbar">
          <span>9:41</span>
          <div class="statusbar__icons">
            <span>5G</span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
            <span class="statusbar__dot"></span>
          </div>
        </header>

        <div class="safe-area journey-screen">
          <div class="top-row top-row--compact top-row--end">
            <button class="icon-btn" aria-label="Menu">☰</button>
          </div>

          <section class="map-card map-card--route-view">
            <div class="map-live js-map-journey" aria-label="Journey map"></div>
          </section>

          <section class="route-details-card">
            <h2 class="route-details-title">AllRide Journey</h2>

            <div class="route-point">
              <span>📍</span>
              <div>
                <strong class="js-route-pickup">Blk C Carpark, Singapore University</strong>
                <p>463 Clementi Road, Singapore 599494</p>
              </div>
            </div>

            <div class="route-point">
              <span>📌</span>
              <div>
                <strong class="js-route-destination">Tampines Mall</strong>
                <p>4 Tampines Central 5, Singapore 529510</p>
              </div>
            </div>

            <button class="add-location js-add-location" type="button">+ Add more location</button>
          </section>

          <section class="payment-strip">
            <p class="label">Payment Method</p>
            <div class="payment-row">
              <button class="pay-chip js-payment-chip" type="button" data-payment="Mastercard">Mastercard</button>
              <button class="pay-chip js-payment-chip" type="button" data-payment="VISA">VISA</button>
              <button class="pay-chip js-payment-chip" type="button" data-payment="Apple Pay">Apple Pay</button>
              <button class="pay-chip js-payment-chip" type="button" data-payment="GPay">GPay</button>
              <button class="pay-chip js-payment-chip" type="button" data-payment="Cash">Cash</button>
            </div>
          </section>

          <a class="btn btn--primary btn--lg js-go-rides" href="./rides.html">Find vehicles</a>

          <nav class="bottom-tabs">
            <a class="bottom-tab" data-tab="home.html" href="./home.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/home.png" alt="" /></span>
              <span class="tab-label">Home</span>
            </a>
            <a class="bottom-tab" data-tab="journey.html,rides.html" href="./journey.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/rides.png" alt="" /></span>
              <span class="tab-label">Rides</span>
            </a>
            <a class="bottom-tab" data-tab="tracking.html" href="./tracking.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/track.png" alt="" /></span>
              <span class="tab-label">Track</span>
            </a>
            <a class="bottom-tab" data-tab="profile.html" href="./profile.html">
              <span class="tab-icon" aria-hidden="true"><img class="tab-icon-img" src="../assets/ui/profile.png" alt="" /></span>
              <span class="tab-label">Profile</span>
            </a>
          </nav>
        </div>
      </section>

      <nav class="flow-nav">
        <a class="flow-nav__link" href="./home.html">← Back</a>
        <a class="flow-nav__link" href="./rides.html">Next →</a>
      </nav>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="../assets/app.js"></script>
  </body>
</html>
